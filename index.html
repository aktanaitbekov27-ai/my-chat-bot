<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNIT | Interface</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00b4d8;
            --bg: #030712; /* Цвет как у новых версий GPT */
            --sidebar: #000814;
            --text: #ececec;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            display: flex;
            overflow: hidden;
        }

        /* Боковая панель (Sidebar) */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar);
            display: flex;
            flex-direction: column;
            padding: 20px;
            border-right: 1px solid rgba(0, 180, 216, 0.2);
            justify-content:间-between;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--primary);
            letter-spacing: 4px;
            text-shadow: 0 0 10px rgba(0, 180, 216, 0.3);
        }

        /* Главная рабочая область */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: relative;
        }

        /* Контейнер для чата (на максимум места) */
        .ai-container {
            flex-grow: 1;
            width: 100%;
            height: 100%;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            /* Убираем скролл бары самого iframe если можно */
        }

        /* Секция контактов в сайдбаре */
        .contacts {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 20px;
        }

        .contact-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            opacity: 0.6;
        }

        .social-btn {
            display: flex;
            align-items: center;
            text-decoration: none;
            color: white;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 0.9rem;
            transition: 0.2s;
            background: rgba(255, 255, 255, 0.05);
        }

        .social-btn:hover {
            background: rgba(0, 180, 216, 0.2);
            color: var(--primary);
        }

        .tg-color { border-left: 3px solid #0088cc; }
        .wa-color { border-left: 3px solid #25d366; }

        .dev-info {
            font-size: 0.7rem;
            opacity: 0.4;
            margin-top: 20px;
        }

        /* Адаптивность для мобилок */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--primary); padding: 10px; }
            .main-content { height: calc(100vh - 150px); }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="top-part">
            <div class="logo-section">
                <h1 class="logo">UNIT</h1>
                <div style="font-size: 0.6rem; opacity: 0.5; letter-spacing: 2px;">NEURAL CORE</div>
            </div>
            
            <div style="margin-top: 40px;">
                <div class="social-btn" style="cursor: default; background: rgba(0, 180, 216, 0.1);">
                    🟢 System: Online
                </div>
            </div>
        </div>

        <div class="contacts">
            <div class="contact-label">Разработчик</div>
            <a href="https://t.me/aktan2011" target="_blank" class="social-btn tg-color">
                Telegram
            </a>
            <a href="https://wa.me/996995001062" target="_blank" class="social-btn wa-color">
                WhatsApp
            </a>
            <div class="dev-info">Aktan | UNIT v2.0 © 2026</div>
        </div>
    </aside>

    <main class="main-content">
        <div class="ai-container">
            <iframe src="https://aktan27-ai-portfolio.hf.space"></iframe>
        </div>
    </main>

</body>
</html>
