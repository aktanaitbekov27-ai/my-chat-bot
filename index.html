<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UNIT | AI Interface</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        :root {
            --primary: #00b4d8;
            --bg: #050505; 
            --sidebar: #000000;
            --text: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            display: flex;
            overflow: hidden; /* Критично: убираем скролл самого сайта */
        }

        /* Сайдбар в стиле GPT */
        .sidebar {
            width: 260px;
            min-width: 260px;
            background-color: var(--sidebar);
            display: flex;
            flex-direction: column;
            padding: 20px;
            border-right: 1px solid #202020;
            z-index: 100;
        }

        .logo-box {
            padding: 10px 0 30px 0;
            text-align: center;
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4rem;
            color: var(--primary);
            letter-spacing: 3px;
            font-weight: 900;
        }

        /* Главная область чата */
        .chat-wrapper {
            flex: 1;
            height: 100vh;
            position: relative;
            background: #000;
        }

        /* Тот самый "Масштабный" Iframe */
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* Контакты внизу */
        .nav-footer {
            margin-top: auto;
            padding-top: 20px;
            border-top: 1px solid #202020;
        }

        .btn-contact {
            display: block;
            text-decoration: none;
            color: #8e8e8e;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 8px;
            font-size: 0.85rem;
            transition: 0.2s;
            background: #171717;
        }

        .btn-contact:hover {
            background: #252525;
            color: var(--primary);
        }

        .status-tag {
            font-size: 0.65rem;
            color: #10a37f;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot { width: 6px; height: 6px; background: #10a37f; border-radius: 50%; box-shadow: 0 0 5px #10a37f; }

        /* Для мобильных устройств */
        @media (max-width: 768px) {
            .sidebar { display: none; } /* Скрываем боковую панель на телефонах для максимума чата */
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo-box">
            <div class="logo-text">UNIT</div>
            <div style="font-size: 0.6rem; opacity: 0.4; margin-top: 4px;">NEURAL CORE PRO</div>
        </div>

        <div class="status-tag"><span class="status-dot"></span> System Active</div>

        <nav class="nav-footer">
            <div style="font-size: 0.65rem; opacity: 0.4; margin-bottom: 10px;">СВЯЗЬ С DEVELOPER</div>
            <a href="https://t.me/aktan2011" target="_blank" class="btn-contact">Telegram</a>
            <a href="https://wa.me/996995001062" target="_blank" class="btn-contact">WhatsApp</a>
            <div style="font-size: 0.6rem; opacity: 0.3; margin-top: 15px; text-align: center;">UNIT v2.0 | Aktan</div>
        </nav>
    </aside>

    <main class="chat-wrapper">
        <iframe src="https://aktan27-ai-portfolio.hf.space/?__theme=dark"></iframe>
    </main>

</body>
</html>
