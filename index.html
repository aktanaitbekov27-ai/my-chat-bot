<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UNIT | Neural Interface</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        :root {
            --primary: #00b4d8;
            --bg: #0d0d0d;
            --sidebar: #000000;
            --header-h: 60px; /* Высота верхней панели */
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            background-color: var(--bg);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            display: flex;
            overflow: hidden;
        }

        /* Сайдбар */
        .sidebar {
            width: 240px;
            background-color: var(--sidebar);
            display: flex;
            flex-direction: column;
            padding: 20px;
            border-right: 1px solid #252525;
            z-index: 10;
        }

        /* Верхняя панель (чтобы название не мешало кнопкам чата) */
        .top-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: var(--header-h);
            background: rgba(13, 13, 13, 0.8);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 5;
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            color: var(--primary);
            letter-spacing: 3px;
            font-weight: 900;
            margin-right: 20px;
        }

        /* Основная область */
        .content-area {
            flex: 1;
            position: relative;
            height: 100vh;
        }

        /* Фрейм чата */
        .iframe-container {
            position: absolute;
            top: 0; /* Чат начинается под топ-баром визуально, но фрейм на весь экран */
            left: 0;
            width: 100%;
            height: 100%;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            /* Сдвигаем контент чата чуть ниже, чтобы кнопки Gradio (справа сверху) 
               не перекрывались нашим заголовком, если они там есть */
            padding-top: var(--header-h); 
        }

        /* Контакты */
        .nav-bottom { margin-top: auto; border-top: 1px solid #252525; padding-top: 15px; }
        .social-link {
            display: block;
            text-decoration: none;
            color: #888;
            padding: 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            margin-bottom: 5px;
            transition: 0.2s;
        }
        .social-link:hover { background: #1a1a1a; color: var(--primary); }

        @media (max-width: 768px) {
            .sidebar { display: none; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div style="font-size: 0.7rem; color: var(--primary); margin-bottom: 20px;">SYSTEM: ONLINE</div>
        
        <div class="nav-bottom">
            <div style="font-size: 10px; opacity: 0.4; margin-bottom: 10px;">DEVELOPER</div>
            <a href="https://t.me/aktan2011" target="_blank" class="social-link">Telegram</a>
            <a href="https://wa.me/996995001062" target="_blank" class="social-link">WhatsApp</a>
        </div>
    </aside>

    <main class="content-area">
        <div class="top-bar">
            <div class="logo-text">UNIT</div>
            <div style="font-size: 0.6rem; opacity: 0.4;">V2.0 NEURAL INTERFACE</div>
        </div>

        <div class="iframe-container">
            <iframe src="https://aktan27-ai-portfolio.hf.space/?__theme=dark"></iframe>
        </div>
    </main>

</body>
</html>
