<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNIT | Next-Gen AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00b4d8;
            --bg: #000814;
            --card-bg: #001d3d;
            --text: #e0e1dd;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* Анимированный фон */
        .bg-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #003566 0%, #000814 70%);
            z-index: -1;
        }

        header {
            padding: 40px 20px;
            text-align: center;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            font-weight: 900;
            color: var(--primary);
            letter-spacing: 10px;
            text-shadow: 0 0 20px rgba(0, 180, 216, 0.5);
            margin: 0;
        }

        .tagline {
            font-size: 1rem;
            opacity: 0.7;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-top: 10px;
        }

        /* Контейнер для ИИ */
        .ai-container {
            max-width: 1000px;
            margin: 40px auto;
            background: var(--card-bg);
            border: 1px solid rgba(0, 180, 216, 0.3);
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 600px;
            border: none;
        }

        /* Футер (Связь с тобой) */
        footer {
            padding: 60px 20px;
            text-align: center;
            background: linear-gradient(to top, #001d3d, transparent);
        }

        .contact-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            margin-bottom: 30px;
            color: var(--primary);
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .btn {
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-weight: bold;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1rem;
        }

        .tg {
            background: #0088cc;
            color: white;
        }

        .wa {
            background: #25d366;
            color: white;
        }

        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            filter: brightness(1.1);
        }

        .dev-tag {
            margin-top: 40px;
            font-size: 0.8rem;
            opacity: 0.5;
        }

    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <header>
        <h1 class="logo">UNIT</h1>
        <div class="tagline">Neural Interface Systems</div>
    </header>

    <main class="ai-container">
        <iframe src="https://aktanza-ai-portfolio.hf.space"></iframe>
    </main>

    <footer>
        <div class="contact-title">Связаться с разработчиком</div>
        <div class="social-links">
            <a href="https://t.me/@aktan2011" target="_blank" class="btn tg">
                Telegram
            </a>
            <a href="https://wa.me/996995001062" target="_blank" class="btn wa">
                WhatsApp
            </a>
        </div>
        <p class="dev-tag">Developed by Aktan | UNIT Systems © 2026</p>
    </footer>

</body>
</html>
